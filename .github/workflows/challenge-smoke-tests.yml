name: Challenge smoke tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pyweek
          POSTGRES_USER: pyweek
          POSTGRES_PASSWORD: pyweek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pyweek -d pyweek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run challenge smoke tests
        env:
          DJANGO_SETTINGS_MODULE: pyweek.test_settings
          POSTGRES_DB: pyweek
          POSTGRES_USER: pyweek
          POSTGRES_PASSWORD: pyweek
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: python -m django test pyweek.challenge.test_smoke -v 2
